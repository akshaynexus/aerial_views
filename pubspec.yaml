name: aerial_views
description: "Flutter library for discovering and streaming aerial videos from Apple, Community, Amazon, Immich, and custom feeds."
version: 0.1.0
homepage: https://github.com/user/aerial_views

environment:
  sdk: ^3.12.1
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  mockito: ^5.4.0

flutter:
  assets:
    - assets/tvos26.json
    - assets/tvos26_strings.json
    - assets/comm1.json
    - assets/comm1_strings.json
    - assets/comm2.json
    - assets/comm2_strings.json
    - assets/fireos8.json
    - assets/fireos8_strings.json
